version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tiba_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tiba_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./tiba-backend/migrations/001_init_schema.sql:/docker-entrypoint-initdb.d/001_init_schema.sql

  backend:
    build:
      context: ./tiba-backend
      dockerfile: Dockerfile
    container_name: tiba_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: tiba_db
      DB_SSLMODE: disable
      JWT_SECRET: tiba-secret-key-change-in-production
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 720h
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: 10485760
      ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - postgres

  frontend:
    build:
      context: ./tiba-frontend
      dockerfile: Dockerfile
    container_name: tiba_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_USE_MOCK: "false"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
